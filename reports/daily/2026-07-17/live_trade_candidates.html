
<!DOCTYPE html>
<html>
<head>
    <title>Trading AI Live Trade Candidates</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f7f7f7;
            color: #222;
        }
        h1, h2 {
            color: #111;
        }
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
            overflow-x: auto;
        }
        .metric {
            display: inline-block;
            margin-right: 30px;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .metric strong {
            display: block;
            font-size: 13px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            white-space: nowrap;
        }
        th, td {
            border-bottom: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background: #eee;
        }
    </style>
</head>
<body>

<h1>Trading AI Live Trade Candidates</h1>

<div class="card">
    <h2>Summary</h2>
    <div class="metric"><strong>Date</strong>2026-07-17</div>
    <div class="metric"><strong>Trade Candidates</strong>0</div>
    <div class="metric"><strong>Capital</strong>$100,000.00</div>
    <div class="metric"><strong>Risk / Trade</strong>2.00%</div>
    <div class="metric"><strong>Max Position</strong>5.00%</div>
    <div class="metric"><strong>Take Profit</strong>30.00%</div>
    <div class="metric"><strong>Stop Loss</strong>15.00%</div>
</div>

<div class="card">
    <h2>Recommended Live Trade Cards</h2>
    <p>No live trade candidates.</p>
</div>

<div class="card">
    <h2>Ranking Details</h2>
    <p>No live trade candidates.</p>
</div>

</body>
</html>
